<div class="transition-all absolute h-dvh w-dvw top-0 left-0 flex items-center justify-center p-4 z-250 backdrop-blur-sm" 
     [class]="(theme.isDarkMode$ | async) === '1' ? 'bg-black/70' : 'bg-black/50'">
    
    <div class="rounded-lg shadow-2xl w-full max-w-md overflow-hidden animate-fade-in-up flex flex-col transition-colors duration-300" 
         [class]="(theme.isDarkMode$ | async) === '1' ? 'bg-slate-800 border border-slate-700' : 'bg-white'">
        
        <div class="px-8 py-5 flex justify-between items-center shrink-0 transition-colors" 
             [class]="(theme.isDarkMode$ | async) === '1' ? 'bg-slate-900 border-b border-slate-700' : 'background-cec-blue'">
            <div class="flex items-center gap-4">
                <img [src]="image.cecLogoPath" alt="CEC Logo" class="h-10 w-10 object-contain rounded-full p-1 shadow-sm transition-colors" 
                     [class]="(theme.isDarkMode$ | async) === '1' ? 'bg-slate-800' : 'bg-white'">
                <h2 class="text-white text-xl font-bold tracking-wide">Group Members</h2>
            </div>
            
            <button (click)="navigator.descend(route)" class="cursor-pointer transition-colors" 
                    [class]="(theme.isDarkMode$ | async) === '1' ? 'text-gray-400 hover:text-white' : 'text-white/80 hover:text-white'">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <div class="p-6 flex flex-col flex-grow">
            
            <div class="relative mb-6">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </span>
                <input type="text" placeholder="Search members..."
                    class="w-full border rounded-md pl-10 pr-4 py-2.5 focus:outline-none focus:ring-2 transition-all text-sm font-medium"
                    [class]="(theme.isDarkMode$ | async) === '1' ? 'bg-slate-900 border-slate-700 text-white focus:ring-blue-500/40' : 'bg-gray-50 border-gray-200 text-gray-900 focus:ring-blue-500/30'">
            </div>

            <div class="flex-grow overflow-y-auto max-h-[50vh] space-y-3 pr-2 custom-scrollbar">
                
                <div class="flex items-center justify-between p-3 rounded-lg border transition-all"
                     [class]="(theme.isDarkMode$ | async) === '1' ? 'bg-slate-700/30 border-slate-700 hover:bg-slate-700/50' : 'bg-white border-gray-100 hover:bg-gray-50'">
                    <div class="flex items-center gap-3">
                        <div class="relative">
                            <img src="https://ui-avatars.com/api/?name=Mills+Belamide&background=0C0C84&color=fff" class="h-10 w-10 rounded-full border-2 border-blue-500 shadow-sm" alt="">
                            <span class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-white dark:border-slate-800 rounded-full"></span>
                        </div>
                        <div>
                            <h4 class="text-sm font-bold transition-colors" [class]="(theme.isDarkMode$ | async) === '1' ? 'text-white' : 'text-gray-900'">Mills Belamide</h4>
                            <span class="text-[10px] font-black uppercase tracking-widest text-blue-500">Leader / Dev</span>
                        </div>
                    </div>
                    <button class="text-xs font-bold px-3 py-1 rounded bg-blue-500/10 text-blue-500 transition-colors hover:bg-blue-500 hover:text-white">Profile</button>
                </div>

                <div *ngFor="let i of [1, 2, 3]" class="flex items-center justify-between p-3 rounded-lg border transition-all"
                     [class]="(theme.isDarkMode$ | async) === '1' ? 'bg-slate-700/30 border-slate-700' : 'bg-white border-gray-100 hover:bg-gray-50'">
                    <div class="flex items-center gap-3">
                        <img [src]="'https://ui-avatars.com/api/?name=Student+' + i + '&background=random'" class="h-10 w-10 rounded-full grayscale opacity-80" alt="">
                        <div>
                            <h4 class="text-sm font-bold transition-colors" [class]="(theme.isDarkMode$ | async) === '1' ? 'text-white' : 'text-gray-900'">Student User #{{i}}</h4>
                            <span class="text-[10px] font-black uppercase tracking-widest text-gray-400">Member</span>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button class="p-2 rounded hover:bg-gray-100 dark:hover:bg-slate-600 text-gray-400 transition-colors">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                        </button>
                    </div>
                </div>

            </div>

            <div class="mt-6 pt-4 border-t flex justify-end" [class]="(theme.isDarkMode$ | async) === '1' ? 'border-slate-700' : 'border-gray-100'">
                <button (click)="navigator.descend(route)" class="px-8 py-2 rounded-md font-bold text-sm shadow-md transition-all text-white" 
                        [class]="(theme.isDarkMode$ | async) === '1' ? 'bg-blue-600 hover:bg-blue-700' : 'background-cec-blue hover:opacity-90'">
                    Close List
                </button>
            </div>
        </div>
        
        <div class="border-t px-8 py-4 shrink-0 transition-colors" 
             [class]="(theme.isDarkMode$ | async) === '1' ? 'bg-slate-900 border-slate-700' : 'bg-gray-50 border-gray-100'">
            <p class="text-sm text-center transition-colors" 
               [class]="(theme.isDarkMode$ | async) === '1' ? 'text-gray-400' : 'text-gray-500'">
                Having trouble? <a href="https://www.facebook.com/mills.belamide.2024/" class="font-medium hover:underline" [class]="(theme.isDarkMode$ | async) === '1' ? 'text-blue-400' : 'text-blue-600'">Reach developer</a>
            </p>
        </div>

    </div>
</div>
