<div class="transition-all absolute h-dvh w-dvw top-0 left-0 flex items-center justify-center p-4 z-150 backdrop-blur-sm" 
     [class]="(theme.isDarkMode$ | async) === '1' ? 'bg-black/70' : 'bg-black/50'">
    
    <div class="rounded-lg shadow-2xl w-full max-w-lg overflow-hidden animate-fade-in-up flex flex-col transition-colors duration-300" 
         [class]="(theme.isDarkMode$ | async) === '1' ? 'bg-slate-800 border border-slate-700' : 'bg-white'">
        
        <div class="px-8 py-5 flex justify-between items-center shrink-0 transition-colors" 
             [class]="(theme.isDarkMode$ | async) === '1' ? 'bg-slate-900 border-b border-slate-700' : 'background-cec-blue'">
            <div class="flex items-center gap-4">
                <img [src]="image.cecLogoPath" alt="CEC Logo" class="h-10 w-10 object-contain rounded-full p-1 shadow-sm transition-colors" 
                     [class]="(theme.isDarkMode$ | async) === '1' ? 'bg-slate-800' : 'bg-white'">
                <h2 class="text-white text-2xl font-bold tracking-wide">Update Group</h2>
            </div>
            
            <button (click)="navigator.descend(route)" class="cursor-pointer transition-colors" 
                    [class]="(theme.isDarkMode$ | async) === '1' ? 'text-gray-400 hover:text-white' : 'text-white/80 hover:text-white'">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <div class="p-8 pb-6 flex-grow overflow-y-auto max-h-[70vh]">
            
            <div class="mb-5">
                <label class="block text-sm font-bold mb-2 transition-colors" [class]="(theme.isDarkMode$ | async) === '1' ? 'text-gray-200' : 'text-gray-700'">
                    Group Name
                </label>
                <input type="text" maxlength="99" placeholder="e.g., BSIT Batch 2026"
                    class="w-full border rounded-md px-4 py-3 focus:outline-none focus:ring-2 transition-all text-base"
                    [class]="(theme.isDarkMode$ | async) === '1' ? 'bg-slate-700 border-slate-600 text-white focus:ring-blue-500/40' : 'bg-white border-gray-300 text-gray-900 focus:ring-blue-500/50'">
            </div>

            <div class="mb-5">
                <label class="block text-sm font-bold mb-2 transition-colors" [class]="(theme.isDarkMode$ | async) === '1' ? 'text-gray-200' : 'text-gray-700'">
                    Description
                </label>
                <textarea rows="3" maxlength="999" placeholder="Briefly describe the purpose of this group..."
                    class="w-full border rounded-md px-4 py-3 focus:outline-none focus:ring-2 transition-all text-base resize-none"
                    [class]="(theme.isDarkMode$ | async) === '1' ? 'bg-slate-700 border-slate-600 text-white focus:ring-blue-500/40' : 'bg-white border-gray-300 text-gray-900 focus:ring-blue-500/50'"></textarea>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-5">
                <div>
                    <label class="block text-sm font-bold mb-2 transition-colors" [class]="(theme.isDarkMode$ | async) === '1' ? 'text-gray-200' : 'text-gray-700'">
                        Privacy Policy
                    </label>
                    <select class="w-full border rounded-md px-3 py-3 focus:outline-none focus:ring-2 transition-all text-sm appearance-none cursor-pointer"
                        [class]="(theme.isDarkMode$ | async) === '1' ? 'bg-slate-700 border-slate-600 text-white' : 'bg-white border-gray-300 text-gray-900'">
                        <option value="open">Open (Public)</option>
                        <option value="request_join">Request to Join</option>
                        <option value="close">Closed (Private)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-bold mb-2 transition-colors" [class]="(theme.isDarkMode$ | async) === '1' ? 'text-gray-200' : 'text-gray-700'">
                        Posting Policy
                    </label>
                    <select class="w-full border rounded-md px-3 py-3 focus:outline-none focus:ring-2 transition-all text-sm appearance-none cursor-pointer"
                        [class]="(theme.isDarkMode$ | async) === '1' ? 'bg-slate-700 border-slate-600 text-white' : 'bg-white border-gray-300 text-gray-900'">
                        <option value="everyone">Everyone</option>
                        <option value="request_post">Request to Post</option>
                        <option value="author_only">Author/Admin Only</option>
                    </select>
                </div>
            </div>

            <div class="mb-2">
                <label class="block text-sm font-bold mb-3 transition-colors" [class]="(theme.isDarkMode$ | async) === '1' ? 'text-gray-200' : 'text-gray-700'">
                    Establish as
                </label>
                <div class="flex gap-4">
                    <label class="flex-1 cursor-pointer group">
                        <input type="radio" name="group_type" value="group" class="hidden peer" checked>
                        <div class="py-3 text-center rounded-md border-2 transition-all font-bold peer-checked:border-blue-500 peer-checked:bg-blue-500/10"
                             [class]="(theme.isDarkMode$ | async) === '1' ? 'bg-slate-700 border-slate-600 text-gray-400' : 'bg-gray-50 border-gray-200 text-gray-500'">
                             Social Group
                        </div>
                    </label>
                    <label class="flex-1 cursor-pointer group">
                        <input type="radio" name="group_type" value="class" class="hidden peer">
                        <div class="py-3 text-center rounded-md border-2 transition-all font-bold peer-checked:border-blue-500 peer-checked:bg-blue-500/10"
                             [class]="(theme.isDarkMode$ | async) === '1' ? 'bg-slate-700 border-slate-600 text-gray-400' : 'bg-gray-50 border-gray-200 text-gray-500'">
                             Academic Class
                        </div>
                    </label>
                </div>
            </div>

            <div class="flex justify-end gap-4 mt-8">
                <button (click)="navigator.descend(route)" class="px-6 py-2.5 font-medium rounded-md transition-colors cursor-pointer text-base flex items-center" 
                        [class]="(theme.isDarkMode$ | async) === '1' ? 'text-gray-300 hover:bg-slate-700' : 'text-gray-600 hover:bg-gray-100'">
                    Cancel
                </button>
                <button class="cursor-pointer text-white px-8 py-2.5 rounded-md font-medium shadow-md transition-opacity text-base" 
                        [class]="(theme.isDarkMode$ | async) === '1' ? 'bg-blue-600 hover:bg-blue-700' : 'background-cec-blue hover:opacity-90'">
                    Update Now
                </button>
            </div>
        </div>
        
        <div class="border-t px-8 py-3 shrink-0 transition-colors" [class]="(theme.isDarkMode$ | async) === '1' ? 'bg-slate-900 border-slate-700' : 'bg-gray-50 border-gray-100'">
            <p class="text-xs text-center transition-colors" [class]="(theme.isDarkMode$ | async) === '1' ? 'text-gray-400' : 'text-gray-500'">
                Need technical help? <a href="https://www.facebook.com/mills.belamide.2024/" class="font-medium hover:underline" [class]="(theme.isDarkMode$ | async) === '1' ? 'text-blue-400' : 'text-blue-600'">Reach developer</a>
            </p>
        </div>

    </div>
</div>

<div *ngIf="isLoading" class="fixed inset-0 z-[250] flex items-center justify-center backdrop-blur-sm transition-opacity" [ngClass]="(theme.isDarkMode$ | async) === '1' ? 'bg-slate-900/80' : 'bg-white/50'">
    <div class="flex flex-col items-center gap-5">
        <div class="relative flex items-center justify-center h-24 w-24">
            <div class="absolute inset-0 rounded-full border-4 shadow-md animate-spin" [ngClass]="(theme.isDarkMode$ | async) === '1' ? 'border-slate-700 border-t-blue-400' : 'border-gray-100 border-t-[#0C0C84]'"></div>
            <img [src]="image.cecLogoPath" alt="Loading..." class="h-12 w-12 object-contain animate-pulse" />
        </div>
        <span class="text-sm font-bold tracking-[0.2em] uppercase animate-pulse" [ngClass]="(theme.isDarkMode$ | async) === '1' ? 'text-blue-400' : 'text-[#0C0C84]'">Creating Group</span>
    </div>
</div>

<div *ngIf="message !== ''" tabindex="-1" class="fixed inset-0 z-[200] flex items-center justify-center bg-black/60 backdrop-blur-sm p-4">
    <div class="relative w-full max-w-md overflow-hidden rounded-2xl p-8 text-center shadow-2xl flex flex-col items-center gap-6 animate-in fade-in zoom-in duration-200" [ngClass]="(theme.isDarkMode$ | async) === '1' ? 'bg-slate-800' : 'bg-white'">
        <div class="rounded-full p-4 shadow-sm border" [ngClass]="(theme.isDarkMode$ | async) === '1' ? 'bg-slate-700 border-slate-600' : 'bg-slate-50 border-gray-100'">
            <img [src]="image.cecLogoPath" alt="CEC Logo" class="h-16 w-16 object-contain" />
        </div>

        <div class="w-full flex flex-col items-center gap-5">
            <div class="space-y-2">
                <h3 class="text-xl font-bold" [ngClass]="(theme.isDarkMode$ | async) === '1' ? 'text-white' : 'text-gray-900'">Notice</h3>
                <p class="text-sm font-medium leading-relaxed" [ngClass]="(theme.isDarkMode$ | async) === '1' ? 'text-gray-300' : 'text-gray-500'">
                    {{ message }}
                </p>
            </div>
            <button (click)="message = ''" class="mt-2 w-full rounded-xl px-4 py-3.5 text-sm font-semibold transition-colors focus:ring-4" [ngClass]="(theme.isDarkMode$ | async) === '1' ? 'bg-slate-700 text-white hover:bg-slate-600 focus:ring-slate-600/50' : 'bg-gray-100 text-gray-800 hover:bg-gray-200 focus:ring-gray-200'">
                Dismiss
            </button>
        </div>
    </div>
</div>
